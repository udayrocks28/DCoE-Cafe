<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCOE Café</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:       #0e0c0a;
      --surface:  #181410;
      --gold:     #c9a84c;
      --gold-dim: #7a6330;
      --white:    #f5f0e8;
      --muted:    #6b6560;
      --border:   #2a2520;
    }
 
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.8rem 1rem 0;
      position: relative;
    }
    .header-rule {
      width: 40px; height: 1px;
      background: var(--gold);
      margin: 0 auto 1rem;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--white);
      text-transform: uppercase;
    }
    header p {
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.4rem;
    }
 
    /* ── Nav Tabs ── */
    nav {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 2.4rem;
      border-bottom: 1px solid var(--border);
    }
    .nav-btn {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.85rem 2.8rem;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color 0.25s;
    }
    .nav-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .nav-btn.active {
      color: var(--gold);
    }
    .nav-btn.active::after {
      transform: scaleX(1);
    }
    .nav-btn:hover { color: var(--white); }
 
    /* ── Pages ── */
    .page { display: none; padding: 2.4rem 1.2rem 4rem; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }
 
    /* ── MENU PAGE — single full image ── */
    .menu-image-wrap {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .menu-image-wrap img {
      width: 100%;
      display: block;
      border-radius: 4px;
    }
    .menu-label {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    /* ── POSTER PAGE — masonry-style grid ── */
    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 1.6rem;
    }
    .poster-grid {
      columns: 2;
      column-gap: 10px;
    }
    @media (max-width: 480px) {
      .poster-grid { columns: 1; }
    }
    .poster-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .poster-item img {
      width: 100%;
      display: block;
      border-radius: 4px;
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    .poster-item:hover img {
      transform: scale(1.03);
      filter: brightness(0.75);
    }
    .poster-item .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .poster-item:hover .overlay { opacity: 1; }
    .overlay-icon {
      width: 44px; height: 44px;
      border: 1.5px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: #fff;
    }
 
    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 96vw;
      max-height: 90vh;
      border-radius: 4px;
      object-fit: contain;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }
    .lightbox-close {
      position: fixed;
      top: 1.2rem; right: 1.4rem;
      font-size: 1.8rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.5;
      background: none;
      border: none;
      padding: 0 1rem;
      transition: opacity 0.2s;
    }
    .lightbox-nav:hover { opacity: 1; }
    #lb-prev { left: 0.5rem; }
    #lb-next { right: 0.5rem; }
 
    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem 1rem 2.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .gold-dot { color: var(--gold); }
  </style>
</head>
<body>
 
<header>
  <div class="header-rule"></div>
  <!-- ✏️ CHANGE: Replace with your restaurant name -->
  <h1>The Digital CoE Café</h1>
  <!-- ✏️ CHANGE: Replace with your tagline -->
  <p>Fine Dining</p>
</header>
 
<nav>
  <button class="nav-btn active" onclick="showPage('menu', this)">Menu</button>
  <button class="nav-btn" onclick="showPage('poster', this)">Posters</button>
</nav>
 
<!-- ══════════════ MENU PAGE ══════════════ -->
<div class="page active" id="page-menu">
  <div class="menu-image-wrap">
    <!--
      ✏️ HOW TO REPLACE THIS IMAGE:
      1. Add your menu image file to the same folder as this index.html
      2. Change "menu.jpg" below to your actual filename
      Example: <img src="DCoE menu.jpg" alt="Our Menu">
    -->
    <img src="DCoE menu.jpg" alt="Our Menu" />
  </div>
  <p class="menu-label">Tap image to zoom &nbsp;·&nbsp; Updated seasonally</p>
</div>
 
<!-- ══════════════ POSTER PAGE ══════════════ -->
<div class="page" id="page-poster">
  <p class="section-heading">Gallery</p>
 
  <div class="poster-grid" id="poster-grid">
    <!--
      ✏️ HOW TO ADD / REMOVE POSTERS:
      - Copy one <div class="poster-item"> block and paste it to add more
      - Change the src="poster1.jpg" to your actual image filename
      - Delete a block to remove that image
      - All images must be in the same folder as index.html
    -->
 
    <div class="poster-item" onclick="openLightbox(0)">
      <img src="Slide1.jpeg" alt="Poster 1" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>
 
    <div class="poster-item" onclick="openLightbox(1)">
      <img src="Slide2.jpeg" alt="Poster 2" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>
 
    <div class="poster-item" onclick="openLightbox(2)">
      <img src="Slide3.jpeg" alt="Poster 3" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>
 
    <div class="poster-item" onclick="openLightbox(3)">
      <img src="Slide4.jpeg" alt="Poster 4" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>
 
    <div class="poster-item" onclick="openLightbox(4)">
      <img src="Slide5.jpeg" alt="Poster 5" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>


    <div class="poster-item" onclick="openLightbox(5)">
      <img src="Slide6.jpeg" alt="Poster 6" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <div class="poster-item" onclick="openLightbox(6)">
      <img src="Slide7.jpeg" alt="Poster 7" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <div class="poster-item" onclick="openLightbox(7)">
      <img src="Slide8.jpeg" alt="Poster 8" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <div class="poster-item" onclick="openLightbox(8)">
      <img src="Slide9.jpeg" alt="Poster 9" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <div class="poster-item" onclick="openLightbox(9)">
      <img src="Slide10.jpeg" alt="Poster 10" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <div class="poster-item" onclick="openLightbox(10)">
      <img src="Slide11.jpeg" alt="Poster 11" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <div class="poster-item" onclick="openLightbox(11)">
      <img src="Slide12.jpeg" alt="Poster 12" />
      <div class="overlay"><div class="overlay-icon">⤢</div></div>
    </div>

    <!-- Add more poster blocks here if needed -->
 
  </div>
</div>
 
<!-- ══════════════ LIGHTBOX ══════════════ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav" id="lb-prev" onclick="event.stopPropagation(); navigate(-1)">‹</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()" />
  <button class="lightbox-nav" id="lb-next" onclick="event.stopPropagation(); navigate(1)">›</button>
</div>
 
<footer>
  <!-- ✏️ CHANGE: Replace with your restaurant name -->
  <span class="gold-dot">✦</span> &nbsp; The Digital CoE Café &nbsp; <span class="gold-dot">✦</span>
</footer>
 
<script>
  // ── Tab switching ──
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
  }
 
  // ── Lightbox ──
  let currentIndex = 0;
 
  function getPosterImages() {
    return [...document.querySelectorAll('.poster-item img')];
  }
 
  function openLightbox(index) {
    const imgs = getPosterImages();
    currentIndex = index;
    document.getElementById('lb-img').src = imgs[index].src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
 
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
 
  function navigate(dir) {
    const imgs = getPosterImages();
    currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
    document.getElementById('lb-img').src = imgs[currentIndex].src;
  }
 
  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowRight')  navigate(1);
    if (e.key === 'ArrowLeft')   navigate(-1);
  });
 
  // Menu image tap to zoom
  const menuImg = document.querySelector('.menu-image-wrap img');
  if (menuImg) {
    menuImg.style.cursor = 'zoom-in';
    menuImg.addEventListener('click', () => {
      const imgs = [menuImg];
      currentIndex = 0;
      document.getElementById('lb-img').src = menuImg.src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  }
</script>
 
</body>
</html>
